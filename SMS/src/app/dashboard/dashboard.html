<div class="flex h-screen bg-[#faf0ff] font-sans">
  
  <!-- 1. LEFT SIDEBAR -->
  <aside class="w-100 bg-[#5b1c5f] text-[#f5e3ff] flex flex-col justify-between p-6">
    <div class="space-y-8">
      <!-- Title Header -->
      <div>
        <h1 class="text-xl font-bold text-white tracking-tight">StaffSync Pro</h1>
        <p class="text-[10px] font-bold text-[#c4a0e7] tracking-widest uppercase mt-0.5">Enterprise Admin</p>
      </div>

      <!-- Navigation Menu -->
      <nav class="space-y-1">
        <a class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium hover:bg-[#8e44c7] hover:text-white transition duration-150 cursor-pointer">
          <svg class="w-5 h-5 text-[#c4a0e7]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z"></path>
          </svg>
          Dashboard
        </a>
        <a class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold bg-[#7d42b2] text-white transition duration-150 cursor-pointer">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
          </svg>
          Employee Directory
        </a>
        <a class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium hover:bg-[#8e44c7] hover:text-white transition duration-150 cursor-pointer">
          <svg class="w-5 h-5 text-[#c4a0e7]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
          </svg>
          Department Tools
        </a>
        <a class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium hover:bg-[#8e44c7] hover:text-white transition duration-150 cursor-pointer">
          <svg class="w-5 h-5 text-[#c4a0e7]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
          </svg>
          Attendance
        </a>
        <a class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium hover:bg-[#8e44c7] hover:text-white transition duration-150 cursor-pointer">
          <svg class="w-5 h-5 text-[#c4a0e7]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path>
          </svg>
          Settings
        </a>
      </nav>
    </div>

    <!-- Bottom Sidebar -->
    <div class="space-y-4 pt-6 border-t border-[#e9d4ff]">
      <button class="w-full flex items-center justify-center gap-2 py-3 bg-[#fff5ff] text-[#4a0b4a] rounded-xl text-sm font-bold shadow hover:bg-[#f6e0ff] transition cursor-pointer">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path>
        </svg>
        Add New Employee
      </button>

      <a class="flex items-center gap-3 px-4 py-2 rounded-xl text-sm font-medium hover:text-white transition cursor-pointer">
        <svg class="w-5 h-5 text-[#b08acf]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"></path>
        </svg>
        Help Center
      </a>
      <a (click)="logout()" class="flex items-center gap-3 px-4 py-2 rounded-xl text-sm font-medium hover:text-white transition cursor-pointer">
        <svg class="w-5 h-5 text-[#b08acf]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
        </svg>
        Logout
      </a>
    </div>
  </aside>

  <!-- 2. MAIN WORKSPACE AREA -->
  <div class="flex-grow flex flex-col overflow-hidden">
    <!-- Navbar / Header -->
    <header class="bg-white border-b border-[#e9d4ff] flex items-center justify-between px-8 py-4 shrink-0">
      <!-- Search Input -->
      <div class="relative w-80">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
          <svg class="w-4 h-4 text-[#c4a0e7]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </span>
        <input type="text" placeholder="Search employees, departments..." class="w-full text-sm bg-[#f9eaff] border border-[#edd1ff] rounded-xl py-2 pl-10 pr-4 placeholder-[#b08acf] text-[#4a0b4a] focus:outline-none focus:ring-2 focus:ring-[#d46fe3] focus:bg-white transition duration-200" />
      </div>

      <!-- Action items -->
      <div class="flex items-center gap-6">
        <!-- Notification Bell -->
        <div class="relative">
          <button type="button" class="relative text-[#b08acf] hover:text-[#8c5aae]" (click)="toggleNotifications()">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
            </svg>
            <span *ngIf="(notifications$ | async)?.length" class="absolute -top-1 -right-1 flex min-h-5 min-w-5 items-center justify-center rounded-full bg-red-500 px-1 text-[10px] font-bold text-white">
              {{ (notifications$ | async)?.length }}
            </span>
          </button>

          <div *ngIf="showNotifications" class="absolute right-0 top-full z-20 mt-3 w-80 rounded-2xl border border-[#e9d4ff] bg-white p-3 shadow-xl">
            <div class="mb-2 flex items-center justify-between px-2">
              <p class="text-sm font-semibold text-[#4a0b4a]">Notifications</p>
              <span class="text-xs text-[#8c5aae]">{{ (notifications$ | async)?.length || 0 }} new</span>
            </div>
            <div *ngIf="(notifications$ | async)?.length; else emptyNotifications" class="max-h-72 space-y-2 overflow-y-auto">
              <button type="button" *ngFor="let item of notifications$ | async" class="w-full rounded-2xl border border-[#f2d9ff] bg-[#fff5ff] p-3 text-left transition hover:bg-[#f8e6ff]" (click)="openNotification(item.employeeId, item.id)">
                <p class="text-sm font-semibold text-[#4a0b4a]">{{ item.title }}</p>
                <p class="mt-1 text-xs text-[#6c3f8f]">{{ item.message }}</p>
              </button>
            </div>
            <ng-template #emptyNotifications>
              <p class="px-2 py-6 text-center text-sm text-[#8c5aae]">No new notifications right now.</p>
            </ng-template>
          </div>
        </div>

        <!-- Help Icon -->
        <button class="text-[#b08acf] hover:text-[#8c5aae]">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </button>

        <span class="h-6 w-px bg-[#d9b8ff]"></span>

        <!-- Support Link -->
        <a class="text-sm font-semibold text-[#8c5aae] hover:text-[#4a0b4a] cursor-pointer">Support</a>

        <!-- Quick Action button -->
        <button class="px-5 py-2.5 bg-[#ee82ee] text-white text-sm font-bold rounded-xl shadow-sm hover:bg-[#d46fe3] transition cursor-pointer">
          Quick Action
        </button>

        <!-- User profile details -->
        <div class="flex items-center gap-3">
          <div class="text-right">
            <p class="text-sm font-bold text-[#4a0b4a]">Admin User</p>
            <p class="text-[10px] font-bold text-[#c4a0e7] tracking-wider uppercase">HR Manager</p>
          </div>
          <div class="w-10 h-10 rounded-full bg-[#f1e3ff] overflow-hidden border border-[#e9d4ff]">
            <img src="girl.avif" alt="User Profile Image" class="w-full h-full object-cover" />
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content Body -->
    <main class="flex-grow overflow-y-auto p-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
