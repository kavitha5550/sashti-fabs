<ng-container *ngIf="isLoginRoute(); else dashboardView">
  <div class="flex-grow flex flex-col items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl shadow-md mb-4 hover:scale-105 transition-transform duration-200">
          <img src="icon.png" alt="Logo" class="w-6 h-6">
        </div>

        <label class="block text-2xl font-bold tracking-tight text-[#5b1c5f] select-none">Staff Management</label>
        <p class="text-xs font-medium text-[#8c5aae] tracking-wide mt-1">Enterprise Administration portal</p>
      </div>

      <form (ngSubmit)="onLoginSave()">
        <div class="bg-white rounded-2xl border border-[#e9d4ff] shadow-[0_8px_30px_rgb(0,0,0,0.02)] p-10 space-y-6">
          <div>
            <p class="text-xl font-bold text-[#5b1c5f]">Admin Login</p>
            <h1 class="text-xs text-[#7f4d8f] mt-1 font-normal tracking-wide">please enter your credentials to access the dashboard</h1>
          </div>

          <div class="space-y-4">
            <div>
              <label class="block text-[10px] font-bold text-[#8c5aae] uppercase tracking-widest mb-1.5">Email</label>
              <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                  <svg class="h-4 w-4 text-[#b08acf]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                  </svg>
                </span>
                <input type="text" required [(ngModel)]="loginData.email" name="email" placeholder="admin@gmail.com" class="block w-full rounded-lg border border-[#edd1ff] bg-[#fbecff] py-2.5 pl-10 pr-3 text-sm placeholder-[#b08acf] text-[#420039] focus:border-[#d59aed] focus:bg-white focus:outline-none focus:ring-4 focus:ring-[#f2d9ff] transition-all duration-200" />
              </div>
            </div>

            <div>
              <div class="flex items-center justify-between mb-1.5">
                <label class="text-[10px] font-bold text-[#8c5aae] uppercase tracking-widest">Password</label>
                <label class="text-[11px] font-semibold text-[#7f4d8f] hover:text-[#5b1c5f] cursor-pointer transition-colors duration-150">Forgot Password?</label>
              </div>
              <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                  <svg class="h-4 w-4 text-[#b08acf]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
00" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                  </svg>
                </span>
                <input [type]="showPassword() ? 'text' : 'password'" [(ngModel)]="loginData.password" name="password" required placeholder="********" class="block w-full rounded-lg border border-[#edd1ff] bg-[#fbecff] py-2.5 pl-10 pr-10 text-sm placeholder-[#b08acf] text-[#420039] focus:border-[#d59aed] focus:bg-white focus:outline-none focus:ring-4 focus:ring-[#f2d9ff] transition-all duration-200" />
                <button type="button" (click)="togglePasswordVisibility()" class="absolute inset-y-0 right-0 flex items-center pr-3 text-[#7f4d8f] hover:text-[#5b1c5f] transition-colors duration-150">
                  <svg *ngIf="!showPassword()" class="h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                  </svg>
                  <svg *ngIf="showPassword()" class="h-4.5 w-4.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <div class="flex items-center space-x-2">
            <input type="checkbox" id="remember-me" class="h-4 w-4 rounded border-[#edd1ff] text-[#5b1c5f] focus:ring-[#ee82ee] accent-[#ee82ee] cursor-pointer" />
            <label for="remember-me" class="text-xs text-[#8c5aae] font-medium select-none cursor-pointer hover:text-[#4a0b4a] transition-colors duration-150">Remember me</label>
          </div>

          <div>
            <button [disabled]="isLoading()" class="w-full flex items-center justify-center gap-1.5 bg-[#ee82ee] text-white py-3 px-4 rounded-lg font-semibold text-sm hover:bg-[#d46fe3] active:scale-[0.99] transition-all duration-150 shadow-sm cursor-pointer disabled:opacity-75 disabled:cursor-not-allowed disabled:hover:bg-[#d46fe3]">
              <span *ngIf="!isLoading()">
                Secure Login
              </span>
              <span *ngIf="isLoading()" class="flex items-center gap-2">
                <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Logging in...
              </span>
              <svg *ngIf="!isLoading()" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
              </svg>
            </button>
          </div>

          <div class="pt-5 border-t border-[#e9d4ff] text-center">
            <p class="text-[11px] text-[#8c5aae] font-medium">
              Authorized Users Only.
              <label class="font-semibold text-[#4a0b4a] cursor-pointer ml-0.5 hover:underline">System Status</label>
            </p>
          </div>
        </div>
      </form>
    </div>
  </div>

  <div class="w-full py-6">
    <ul class="flex flex-wrap items-center justify-center gap-x-6 gap-y-1 text-xs font-medium text-[#8c5aae]">
      <li><a class="hover:text-[#4a0b4a] transition-colors duration-150 cursor-pointer">Privacy policy</a></li>
      <li><a class="hover:text-[#4a0b4a] transition-colors duration-150 cursor-pointer">Terms of Service</a></li>
      <li class="text-[#b08acf] select-none">all rights reserved 2026</li>
    </ul>
  </div>
</ng-container>

<ng-template #dashboardView>
  <router-outlet></router-outlet>
</ng-template>
